name: CI

on:
  push:
    branches: [main]
    paths:
      - 'deepseek-api-monitor/**'
  pull_request:
    branches: [main]
    paths:
      - 'deepseek-api-monitor/**'

defaults:
  run:
    working-directory: deepseek-api-monitor

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: deepseek-api-monitor/package-lock.json

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx tsc --noEmit

      - name: Security audit
        run: npm audit --audit-level=high

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: deepseek-api-monitor/package-lock.json

      - run: npm ci

      - name: Run tests
        run: npm test
