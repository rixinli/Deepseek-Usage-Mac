appId: com.deepseek.api-monitor
productName: DeepSeek API Monitor
copyright: MIT License

directories:
  output: release
  buildResources: resources

files:
  - out/**/*
  - "!node_modules/**/*"

mac:
  category: public.app-category.developer-tools
  icon: resources/icon.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false

dmg:
  title: DeepSeek API Monitor
  artifactName: DeepSeek-API-Monitor-${version}-${arch}.${ext}

win:
  icon: resources/icon.ico
  target:
    - target: nsis

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  icon: resources/icon.png
  target:
    - target: AppImage
